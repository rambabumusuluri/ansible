- name: "Installing RedHat and Debian specific package"
  hosts: all
  become: yes
  tasks:
    - name: "Install httpd for RedHat"
      ansible.builtin.package:
        name: httpd
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: "Start httpd for RedHat"
      ansible.builtin.service:
        name: httpd
        state: started
      when: ansible_facts['os_family'] == "RedHat"

    - name: "Install apache2 for Debian"
      ansible.builtin.package:
        name: apache2
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: "Start apache2 for Debian"
      ansible.builtin.service:
        name: apache2
        state: started
      when: ansible_facts['os_family'] == "Debian"
