- name: Deploy configuration using template
  hosts: all
  become: yes
  vars_files:
    - ../vars/common_vars.yml
  tasks:
    - name: Copy app config template
      ansible.builtin.template:
        src: templates/app.conf.j2
        dest: /tmp/app.conf
        owner: root
        group: root
        mode: '0644'
      notify: restart myapp

  handlers:
    - name: restart myapp
      ansible.builtin.service:
        name: myapp
        state: restarted
